# CI Pipeline for Claude Existence Loop
# Runs on PRs and pushes to main branches
#
# Quick wins implemented:
# - Frontend build validation
# - Worker syntax validation (dry-run)
# - Code duplication check
#
# Future additions (see tech_debt.md):
# - ESLint
# - Test suite (Vitest + Miniflare)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # Frontend build
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck budget
        run: pnpm run typecheck:budget

      - name: Phantom class budget
        run: pnpm run phantom-class:budget

      - name: Build workspace packages
        run: pnpm run build:packages

      - name: Build frontend
        run: pnpm build

      # Worker validation
      - name: Validate worker syntax
        working-directory: ./platforms/cloudflare
        run: npx wrangler deploy --dry-run --outdir=dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  duplication:
    name: Code Duplication Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run jscpd
        run: |
          npx jscpd . \
            --ignore "node_modules/**,dist/**,.git/**,.wrangler/**,.venv/**,__pycache__/**,*.pyc,runs/**,docs/**,worker/node_modules/**" \
            --threshold 5 \
            --reporters "console"
        continue-on-error: true  # Don't fail build, just report

      - name: Check duplication threshold
        run: |
          RESULT=$(npx jscpd . \
            --ignore "node_modules/**,dist/**,.git/**,.wrangler/**,.venv/**,__pycache__/**,*.pyc,runs/**,docs/**,worker/node_modules/**" \
            --threshold 5 \
            --reporters "json" \
            --output /tmp/jscpd-report 2>&1 || true)

          if [ -f /tmp/jscpd-report/jscpd-report.json ]; then
            PERCENTAGE=$(cat /tmp/jscpd-report/jscpd-report.json | jq '.statistics.total.percentageTokens // 0')
            echo "Duplication: ${PERCENTAGE}%"

            # Warn if over 3%, fail if over 10%
            if (( $(echo "$PERCENTAGE > 10" | bc -l) )); then
              echo "::error::Code duplication exceeds 10% threshold"
              exit 1
            elif (( $(echo "$PERCENTAGE > 3" | bc -l) )); then
              echo "::warning::Code duplication is above 3%"
            fi
          fi

  deploy-ui:
    name: Deploy UI to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build]  # Only deploy after build passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=clio-ui
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-worker:
    name: Deploy Worker to Cloudflare
    runs-on: ubuntu-latest
    needs: [build]  # Only deploy after build passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # Worker build and deployment
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy worker
        working-directory: ./platforms/cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
